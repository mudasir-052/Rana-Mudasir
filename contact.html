<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - FoodieHub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="logo">
      <h2>FoodieHub</h2>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="orders.html">Orders</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section>
    <h2>Contact Us</h2>
    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required />
      <input type="email" id="email" placeholder="Your Email" required />
      <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
      <div class="success-message" id="contactMsg"></div>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 FoodieHub. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById("contactForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const contactMsg = document.getElementById("contactMsg");

      if (!validateEmail(email)) {
        contactMsg.style.color = "red";
        contactMsg.textContent = "Invalid email address.";
        return;
      }

      const response = await fetch("https://formspree.io/f/xanerkgj", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, message }),
      });

      if (response.ok) {
        contactMsg.style.color = "green";
        contactMsg.textContent = "Message sent successfully!";
        document.getElementById("contactForm").reset();
      } else {
        contactMsg.style.color = "red";
        contactMsg.textContent = "Failed to send message. Try again later.";
      }
    });

    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }
  </script>

</body>
</html>
